<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <title>Quản lý hồ sơ chuyển đổi số</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container mt-4">

    <div class="header">
        <h3>Hệ thống Quản lý Hồ sơ Chuyển đổi Số</h3>
        <p>Sở Giáo dục và Đào tạo</p>
    </div>

    <div class="row mt-4">

        <div class="col-md-4">

            <div class="form-box">

                <h5>+ Thêm hồ sơ mới</h5>

                <label>Tên trường</label>
                <input type="text" class="form-control mb-3">

                <label>Đơn vị quản lý</label>
                <select class="form-select mb-3">
                    <option>Chọn đơn vị</option>
                </select>

                <label>Trạng thái</label>
                <select class="form-select mb-3">
                    <option>Chọn trạng thái</option>
                </select>

                <label>Mô tả</label>
                <textarea class="form-control mb-3"></textarea>

                <button class="btn btn-primary w-100">
                    Thêm hồ sơ
                </button>

            </div>

        </div>

        <div class="col-md-8">

            <button class="btn btn-primary btn-sm loc" data-trangthai="all">
                Tất cả
            </button>

            <button class="btn btn-secondary btn-sm loc" data-trangthai="Chưa bắt đầu">
                Chưa bắt đầu
            </button>

            <button class="btn btn-warning btn-sm loc" data-trangthai="Đang triển khai">
                Đang triển khai
            </button>

            <button class="btn btn-success btn-sm loc" data-trangthai="Hoàn thành">
                Hoàn thành
            </button>

            <div id="danhsach" class="mt-3"></div>

        </div>

    </div>

</div>

<script src="data.js"></script>
<script src="app.js"></script>

</body>
</html>
